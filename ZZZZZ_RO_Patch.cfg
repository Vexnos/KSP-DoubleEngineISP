// All B9PartSwitch Engines excluding Separation Motors
@PART[*]:HAS[~name[PC_Nose],~name[SLS_SRB_sepMotor],~name[SLS_BOLE_sepMotor],~name[bluedog_1875_NoseSep],~name[bluedog_1875_RadialSep],~name[bluedog_Saturn_AJ260_Sepratron],~name[bluedog_Titan1_SeparationBottle],~name[bluedog_Agena_UllageMotor],~name[bluedog_Saturn_S2_Ullage],~name[bluedog_Saturn_S4B_Ullage],~name[bluedog_Saturn_S1_Retro],~name[bluedog_Titan2_S2_RetroMotor],~name[bluedog_Saturn_S1C_EngineMount],~name[bluedog_Saturn_S4B_Interstage],~name[bluedog_Apollo_LES],~name[bluedog_BigG_LES],~name[bluedog_Gemini_LES],~name[bluedog_Mercury_LES],~name[orion_abort_jetMotor],~name[orion_abort_abortMotor]]:FINAL
{
    @MODULE[ModuleB9PartSwitch],*
    {
        @SUBTYPE,*
        {
            @MODULE,*
            {
                @DATA
                {
                    @atmosphereCurve
                    {
                        @key,*[1, ] *= 2.061
                    }
                }
            }
        }
    }
}

// All Regular Engines excluding Separation Motors
@PART[*]:HAS[~name[PC_Nose],~name[SLS_SRB_sepMotor],~name[SLS_BOLE_sepMotor],~name[bluedog_1875_NoseSep],~name[bluedog_1875_RadialSep],~name[bluedog_Saturn_AJ260_Sepratron],~name[bluedog_Titan1_SeparationBottle],~name[bluedog_Agena_UllageMotor],~name[bluedog_Saturn_S2_Ullage],~name[bluedog_Saturn_S4B_Ullage],~name[bluedog_Saturn_S1_Retro],~name[bluedog_Titan2_S2_RetroMotor],~name[bluedog_Saturn_S1C_EngineMount],~name[bluedog_Saturn_S4B_Interstage],~name[bluedog_Apollo_LES],~name[bluedog_BigG_LES],~name[bluedog_Gemini_LES],~name[bluedog_Mercury_LES],~name[orion_abort_jetMotor],~name[orion_abort_abortMotor],@MODULE[ModuleEngines*]]:FINAL
{
    @MODULE[ModuleEngines*]
    {
        @atmosphereCurve
        {
            @key,*[1, ] *= 2.061
        }
    }
}

// All RCS
@PART[*]:HAS[@MODULE[ModuleRCS]]:FINAL
{
    @MODULE[ModuleRCS]
    {
        @atmosphereCurve
        {
            @key,*[1, ] *= 2.061
        }
    }
}
