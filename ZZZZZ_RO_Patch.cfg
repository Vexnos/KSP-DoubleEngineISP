@PART[*]:FINAL
{
    @MODULE[ModuleB9PartSwitch],*
    {
        @SUBTYPE,*
        {
            @MODULE,*
            {
                @DATA
                {
                    @atmosphereCurve
                    {
                        @key,*[1, ] *= 2.061
                    }
                }
            }
        }
    }
}

@PART[*]:HAS[@MODULE[ModuleEngines*]]:FINAL
{
    @MODULE[ModuleEngines*]
    {
        @atmosphereCurve
        {
            @key,*[1, ] *= 2.061
        }
    }
}

@PART[*]:HAS[@MODULE[ModuleRCS]]:FINAL
{
    @MODULE[ModuleRCS]
    {
        @atmosphereCurve
        {
            @key,*[1, ] *= 2.061
        }
    }
}
